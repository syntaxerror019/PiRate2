<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% block title %}PiRate — mileshilliard.com{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='toast.js') }}"></script>
    <script src="{{ url_for('static', filename='downloads.js') }}"></script>
    <script src="{{ url_for('static', filename='home.js') }}"></script>
    {% block head_extra %}{% endblock %}
    <style>
        :root {
            --bg:       #060d14;
            --surface:  #0b1624;
            --surface2: #0f2033;
            --border:   rgba(255,190,60,0.12);
            --gold:     #f7b731;
            --gold2:    #e8a820;
            --teal:     #1fc9b8;
            --teal-dim: rgba(31,201,184,0.15);
            --text:     #cdd9e5;
            --text-dim: #6d8499;
            --font-display: 'Syne', sans-serif;
            --font-mono:    'Space Mono', monospace;
            --radius:   10px;
            --transition: 0.18s ease;
        }

        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-mono);
            min-height: 100vh;
        }

        /* ── Noise overlay ─────────────────────────────── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: 0.35;
        }

        body > * { position: relative; z-index: 1; }

        /* ── Header / Nav ──────────────────────────────── */
        header {
            background: linear-gradient(180deg, rgba(10,20,35,0.98) 0%, rgba(6,13,20,0.95) 100%);
            border-bottom: 1px solid var(--border);
            padding: 0;
            backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 100;
        }

        .navbar { padding: 0 1.5rem; min-height: 62px; }

        .navbar-brand {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.03em;
            color: var(--gold) !important;
            text-decoration: none;
            display: flex; align-items: center; gap: 8px;
        }

        .navbar-brand::before {
            content: '⚡';
            font-size: 1.1rem;
        }

        .nav-link {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-dim) !important;
            padding: 0.5rem 0.9rem !important;
            border-radius: var(--radius);
            transition: color var(--transition), background var(--transition);
        }

        .nav-link:hover {
            color: var(--gold) !important;
            background: rgba(247,183,49,0.07);
        }

        .navbar-toggler {
            border-color: var(--border);
            padding: 6px 10px;
        }

        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(247,183,49,0.8)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }

        .navbar-collapse { margin-top: 4px; }

        @media (min-width: 992px) {
            .navbar-collapse { margin-top: 0; }
        }

        /* ── Main content ──────────────────────────────── */
        main.pirate-main {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1.25rem 4rem;
        }

        /* ── Page titles ───────────────────────────────── */
        .page-title {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: clamp(1.4rem, 4vw, 2rem);
            color: #fff;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }

        .page-subtitle {
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 1.75rem;
        }

        /* ── Cards / Surfaces ──────────────────────────── */
        .pirate-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        /* ── Inputs ────────────────────────────────────── */
        .form-control {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.88rem;
            padding: 0.65rem 1rem;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .form-control:focus {
            background: var(--surface2);
            color: #fff;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(247,183,49,0.12);
            outline: none;
        }

        .form-control::placeholder { color: var(--text-dim); }

        /* ── Buttons ───────────────────────────────────── */
        .btn-pirate {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.04em;
            background: var(--gold);
            color: #0a0a0a;
            border: none;
            border-radius: var(--radius);
            padding: 0.65rem 1.4rem;
            cursor: pointer;
            transition: background var(--transition), transform 0.1s ease, box-shadow var(--transition);
        }

        .btn-pirate:hover {
            background: var(--gold2);
            box-shadow: 0 4px 18px rgba(247,183,49,0.25);
        }

        .btn-pirate:active { transform: translateY(1px); }

        .btn-pirate-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            border-radius: var(--radius);
            padding: 0.5rem 1rem;
            font-family: var(--font-mono);
            font-size: 0.82rem;
            cursor: pointer;
            transition: border-color var(--transition), color var(--transition);
        }

        .btn-pirate-outline:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* ── Tables ────────────────────────────────────── */
        .pirate-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.84rem;
        }

        .pirate-table thead th {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-dim);
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        .pirate-table tbody td {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid rgba(255,190,60,0.05);
            vertical-align: middle;
            color: var(--text);
        }

        .pirate-table tbody tr:last-child td { border-bottom: none; }

        .pirate-table tbody tr:hover td { background: rgba(247,183,49,0.04); }

        /* ── Badges / status ────────────────────────────── */
        .badge-pirate {
            display: inline-block;
            padding: 3px 9px;
            border-radius: 5px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .badge-active  { background: rgba(31,201,184,0.15); color: var(--teal); }
        .badge-done    { background: rgba(247,183,49,0.12); color: var(--gold); }
        .badge-seeding { background: rgba(31,201,184,0.08); color: #89d4ce; }
        .badge-paused  { background: rgba(255,255,255,0.06); color: var(--text-dim); }

        /* ── Progress bar ───────────────────────────────── */
        .pirate-progress {
            height: 5px;
            background: rgba(255,255,255,0.07);
            border-radius: 99px;
            overflow: hidden;
        }

        .pirate-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--teal) 0%, var(--gold) 100%);
            border-radius: 99px;
            transition: width 0.4s ease;
        }

        /* ── Footer ─────────────────────────────────────── */
        footer {
            border-top: 1px solid var(--border);
            padding: 1.25rem 1.5rem;
            font-size: 0.78rem;
            color: var(--text-dim);
            letter-spacing: 0.03em;
        }

        footer a { color: var(--gold); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        footer .footer-inner {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        /* ── Animate-in ─────────────────────────────────── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeUp 0.45s ease both;
        }

        .animate-in:nth-child(2) { animation-delay: 0.08s; }
        .animate-in:nth-child(3) { animation-delay: 0.16s; }
        .animate-in:nth-child(4) { animation-delay: 0.24s; }
    </style>
</head>

<header>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">PiRate</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu"
                aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarMenu">
                <ul class="navbar-nav gap-1">
                    <li class="nav-item">
                        <a class="nav-link" href="/mydownloads"><i class="bi bi-arrow-down-circle me-1"></i>Downloads</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="bi bi-search me-1"></i>Search</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/controller"><i class="bi bi-display me-1"></i>TV Remote</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<body>
    <main class="pirate-main">
        {% block content %}{% endblock %}
    </main>
</body>

<footer>
    <div class="footer-inner">
        <span>&copy; 2025 &nbsp;—&nbsp; <a href="https://www.mileshilliard.com">mileshilliard.com</a></span>
        <div>
            <a href="#" aria-label="GitHub"><i class="bi bi-github" style="font-size:1.1rem;"></i></a>
        </div>
    </div>
</footer>

</html>
